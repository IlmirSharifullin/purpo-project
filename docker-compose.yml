services:
  ollama:
    image: ollama/ollama:latest
    container_name: purpo-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_models:/root/.ollama
    # Uncomment for NVIDIA GPU passthrough:
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: purpo-app
    depends_on:
      ollama:
        condition: service_healthy
    environment:
      - OLLAMA_HOST=http://ollama:11434
      - OLLAMA_MODEL=qwen2.5:3b
      - LOG_FORMAT=json
      - LOG_LEVEL=INFO
      - METRICS_PORT=8000
    ports:
      - "8000:8000"      # Prometheus metrics scrape endpoint
    volumes:
      - ./data:/app/data
      - ./evals_results:/app/evals_results
    stdin_open: true
    tty: true
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: purpo-web
    command: ["uv", "run", "python", "web/api.py"]
    environment:
      - OLLAMA_HOST=http://host.docker.internal:11434
      - OLLAMA_MODEL=qwen3.5:4b
      - API_PORT=8080
      - METRICS_PORT=8001
      - LOG_FORMAT=json
      - LOG_LEVEL=INFO
    ports:
      - "8080:8080"      # FastAPI chat UI + API
      - "8001:8001"      # Prometheus metrics scrape endpoint
    volumes:
      - ./data:/app/data
    restart: unless-stopped

  # Optional: Prometheus for metrics collection
  prometheus:
    image: prom/prometheus:latest
    container_name: purpo-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
    depends_on:
      - app
    profiles:
      - monitoring

  # Optional: Grafana for dashboards
  grafana:
    image: grafana/grafana:latest
    container_name: purpo-grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    depends_on:
      - prometheus
    profiles:
      - monitoring

volumes:
  ollama_models:
