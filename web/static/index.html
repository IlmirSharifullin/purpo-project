<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Кулинарный ассистент</title>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f5f5f5;
      color: #1a1a1a;
      height: 100dvh;
      display: flex;
    }

    /* ── Sidebar ── */
    #sidebar {
      width: 240px;
      min-width: 240px;
      background: #1e1e2e;
      color: #cdd6f4;
      display: flex;
      flex-direction: column;
      padding: 16px 12px;
      gap: 8px;
    }

    #sidebar h2 {
      font-size: 15px;
      font-weight: 600;
      color: #cba6f7;
      padding: 4px 8px 12px;
      border-bottom: 1px solid #313244;
    }

    #btn-new-chat {
      background: #cba6f7;
      color: #1e1e2e;
      border: none;
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      text-align: left;
    }
    #btn-new-chat:hover { background: #b4befe; }

    #session-list { flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 4px; }

    .session-item {
      padding: 8px 10px;
      border-radius: 6px;
      font-size: 13px;
      color: #a6adc8;
      cursor: pointer;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .session-item:hover { background: #313244; color: #cdd6f4; }
    .session-item.active { background: #313244; color: #cba6f7; }

    /* ── Main ── */
    #main {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    #chat-header {
      padding: 14px 20px;
      background: #fff;
      border-bottom: 1px solid #e5e7eb;
      font-size: 15px;
      font-weight: 600;
      color: #374151;
    }
    #chat-header span { font-weight: 400; color: #9ca3af; font-size: 13px; margin-left: 8px; }

    /* ── Messages ── */
    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .bubble-row { display: flex; }
    .bubble-row.user { justify-content: flex-end; }
    .bubble-row.assistant { justify-content: flex-start; }

    .bubble {
      max-width: 70%;
      padding: 12px 16px;
      border-radius: 16px;
      font-size: 14px;
      line-height: 1.6;
    }
    .bubble-row.user .bubble {
      background: #cba6f7;
      color: #1e1e2e;
      border-bottom-right-radius: 4px;
    }
    .bubble-row.assistant .bubble {
      background: #fff;
      border: 1px solid #e5e7eb;
      border-bottom-left-radius: 4px;
    }

    /* markdown inside bubbles */
    .bubble p { margin-bottom: 6px; }
    .bubble p:last-child { margin-bottom: 0; }
    .bubble ul, .bubble ol { padding-left: 20px; margin-bottom: 6px; }
    .bubble li { margin-bottom: 2px; }
    .bubble code { background: #f3f4f6; padding: 1px 5px; border-radius: 4px; font-size: 13px; }
    .bubble pre { background: #f3f4f6; padding: 10px; border-radius: 8px; overflow-x: auto; margin: 6px 0; }
    .bubble pre code { background: none; padding: 0; }
    .bubble strong { font-weight: 600; }

    /* thinking indicator */
    .thinking .bubble {
      color: #9ca3af;
      font-style: italic;
    }
    .thinking .bubble::after {
      content: "";
      display: inline-block;
      width: 6px; height: 6px;
      background: #9ca3af;
      border-radius: 50%;
      margin-left: 6px;
      animation: blink 1s infinite;
      vertical-align: middle;
    }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.2} }

    /* ── Input ── */
    #input-area {
      padding: 16px 20px;
      background: #fff;
      border-top: 1px solid #e5e7eb;
      display: flex;
      gap: 10px;
      align-items: flex-end;
    }

    #user-input {
      flex: 1;
      resize: none;
      border: 1.5px solid #e5e7eb;
      border-radius: 12px;
      padding: 10px 14px;
      font-size: 14px;
      line-height: 1.5;
      font-family: inherit;
      max-height: 160px;
      outline: none;
      transition: border-color 0.15s;
    }
    #user-input:focus { border-color: #cba6f7; }

    #btn-send {
      background: #cba6f7;
      color: #1e1e2e;
      border: none;
      border-radius: 12px;
      padding: 10px 20px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      white-space: nowrap;
      transition: background 0.15s;
    }
    #btn-send:hover:not(:disabled) { background: #b4befe; }
    #btn-send:disabled { opacity: 0.5; cursor: not-allowed; }
  </style>
</head>
<body>

<!-- Sidebar -->
<aside id="sidebar">
  <h2>🍳 Кулинарный ИИ</h2>
  <button id="btn-new-chat">+ Новый чат</button>
  <div id="session-list"></div>
</aside>

<!-- Main chat -->
<main id="main">
  <div id="chat-header">
    Ассистент <span id="thread-label"></span>
  </div>
  <div id="messages"></div>
  <div id="input-area">
    <textarea id="user-input" rows="1" placeholder="Спросите про рецепты, КБЖУ, список покупок…"></textarea>
    <button id="btn-send">Отправить</button>
  </div>
</main>

<script>
  const API = '';  // same origin
  const MAX_SESSIONS = 5;

  let currentThreadId = null;

  // ── Storage helpers ──────────────────────────────────────────────────────

  function getSessions() {
    try { return JSON.parse(localStorage.getItem('sessions') || '[]'); }
    catch { return []; }
  }

  function saveSessions(sessions) {
    localStorage.setItem('sessions', JSON.stringify(sessions));
  }

  function pushSession(tid) {
    let sessions = getSessions().filter(s => s.id !== tid);
    sessions.unshift({ id: tid, ts: Date.now() });
    if (sessions.length > MAX_SESSIONS) sessions = sessions.slice(0, MAX_SESSIONS);
    saveSessions(sessions);
  }

  // ── UI helpers ────────────────────────────────────────────────────────────

  function renderSessionList() {
    const list = document.getElementById('session-list');
    list.innerHTML = '';
    getSessions().forEach(s => {
      const el = document.createElement('div');
      el.className = 'session-item' + (s.id === currentThreadId ? ' active' : '');
      el.textContent = s.id;
      el.title = s.id;
      el.onclick = () => loadSession(s.id);
      list.appendChild(el);
    });
  }

  function setThreadLabel(tid) {
    document.getElementById('thread-label').textContent = tid ? `· ${tid}` : '';
  }

  function addBubble(role, html) {
    const msgs = document.getElementById('messages');
    const row = document.createElement('div');
    row.className = `bubble-row ${role}`;
    const bubble = document.createElement('div');
    bubble.className = 'bubble';
    bubble.innerHTML = html;
    row.appendChild(bubble);
    msgs.appendChild(row);
    msgs.scrollTop = msgs.scrollHeight;
    return row;
  }

  function showThinking() {
    const row = addBubble('assistant thinking', 'Ассистент думает');
    return () => row.remove();
  }

  // Auto-resize textarea
  const textarea = document.getElementById('user-input');
  textarea.addEventListener('input', () => {
    textarea.style.height = 'auto';
    textarea.style.height = Math.min(textarea.scrollHeight, 160) + 'px';
  });

  // ── Session management ────────────────────────────────────────────────────

  async function newSession() {
    const res = await fetch(`${API}/sessions`, { method: 'POST' });
    const data = await res.json();
    currentThreadId = data.thread_id;
    document.getElementById('messages').innerHTML = '';
    pushSession(currentThreadId);
    setThreadLabel(currentThreadId);
    renderSessionList();
  }

  function loadSession(tid) {
    currentThreadId = tid;
    document.getElementById('messages').innerHTML = '';
    addBubble('assistant', '<em>Сессия загружена. История доступна через контекст.</em>');
    setThreadLabel(tid);
    renderSessionList();
  }

  // ── Send message ──────────────────────────────────────────────────────────

  async function sendMessage() {
    const input = document.getElementById('user-input');
    const text = input.value.trim();
    if (!text) return;

    if (!currentThreadId) await newSession();

    input.value = '';
    input.style.height = 'auto';
    document.getElementById('btn-send').disabled = true;

    addBubble('user', escapeHtml(text));
    const removeThinking = showThinking();

    try {
      const res = await fetch(`${API}/chat`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ message: text, thread_id: currentThreadId }),
      });

      removeThinking();

      if (!res.ok) {
        const err = await res.text();
        addBubble('assistant', `<em style="color:#ef4444">Ошибка: ${escapeHtml(err)}</em>`);
        return;
      }

      const data = await res.json();
      currentThreadId = data.thread_id;
      pushSession(currentThreadId);
      setThreadLabel(currentThreadId);
      renderSessionList();

      const html = marked.parse(data.reply || '_(нет ответа)_');
      addBubble('assistant', html);

    } catch (e) {
      removeThinking();
      addBubble('assistant', `<em style="color:#ef4444">Сетевая ошибка: ${escapeHtml(String(e))}</em>`);
    } finally {
      document.getElementById('btn-send').disabled = false;
      input.focus();
    }
  }

  function escapeHtml(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  // ── Event listeners ───────────────────────────────────────────────────────

  document.getElementById('btn-send').onclick = sendMessage;
  document.getElementById('btn-new-chat').onclick = newSession;

  textarea.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  });

  // ── Init ──────────────────────────────────────────────────────────────────

  (async () => {
    const sessions = getSessions();
    if (sessions.length > 0) {
      // Restore last session
      currentThreadId = sessions[0].id;
      setThreadLabel(currentThreadId);
      addBubble('assistant', '<em>Добро пожаловать обратно! Продолжаем прошлый разговор.</em>');
    } else {
      await newSession();
      addBubble('assistant', marked.parse(
        'Привет! Я ваш кулинарный ассистент. Могу помочь:\n\n' +
        '- 🍳 **Найти рецепты** по продуктам в холодильнике\n' +
        '- 📊 **Посчитать КБЖУ** для любого блюда\n' +
        '- 🛒 **Составить список покупок** на неделю\n' +
        '- 👨‍🍳 **Ответить на вопросы** по процессу готовки\n\n' +
        'С чего начнём?'
      ));
    }
    renderSessionList();
    textarea.focus();
  })();
</script>
</body>
</html>
